version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: usuarios_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: prueba_backend
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - usuarios_network

  app:
    build: .
    container_name: usuarios_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://admin:secret@mongodb:27017/prueba_backend?authSource=admin
      CACHE_TTL: 300
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      - mongodb
    networks:
      - usuarios_network
    volumes:
      - ./logs:/app/logs

volumes:
  mongodb_data:

networks:
  usuarios_network:
    driver: bridge